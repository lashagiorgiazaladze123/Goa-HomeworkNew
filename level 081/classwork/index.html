<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Animation</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f9f9f9;
    }

    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #e74c3c;
      position: relative;
      transition: transform 0.5s ease, top 0.5s ease;
    }

    .button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="circle" id="circle"></div>
  <button class="button" id="moveButton">Click to Move Circle</button>

  <script>
    const circle = document.getElementById('circle');
    const moveButton = document.getElementById('moveButton');
    let isMoved = false;

    moveButton.addEventListener('click', () => {
      if (!isMoved) {
        // Move circle up
        circle.style.transform = 'translateY(-200px)';
        circle.style.top = '0';
      } else {
        // Move circle back down to the starting position
        circle.style.transform = 'translateY(0)';
        circle.style.top = '200px';
      }
      isMoved = !isMoved;
    });
  </script>

</body>
</html>
