<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    .store {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 250px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h2 {
      font-size: 1.5rem;
      margin: 15px 0;
    }

    .card p {
      font-size: 1rem;
      color: #555;
      margin: 10px 0;
    }

    .card .price {
      font-size: 1.2rem;
      font-weight: bold;
      color: #28a745;
    }

    .card button {
      padding: 10px 20px;
      border: none;
      background-color: #007bff;
      color: white;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="store">
    <!-- Product cards will be dynamically added here -->
  </div>

  <script>
    // Array of product objects
    const products = [
      {
        id: 1,
        name: 'Smartphone',
        description: 'A high-end smartphone with a 6.5-inch display.',
        price: '$499.99',
        image: 'https://via.placeholder.com/250x150?text=Smartphone'
      },
      {
        id: 2,
        name: 'Laptop',
        description: 'A powerful laptop for work and play.',
        price: '$999.99',
        image: 'https://via.placeholder.com/250x150?text=Laptop'
      },
      {
        id: 3,
        name: 'Headphones',
        description: 'Noise-canceling over-ear headphones.',
        price: '$199.99',
        image: 'https://via.placeholder.com/250x150?text=Headphones'
      }
    ];

    // Dynamically create product cards
    const storeContainer = document.querySelector('.store');

    products.forEach(product => {
      const card = document.createElement('div');
      card.classList.add('card');

      card.innerHTML = `
        <img src="${product.image}" alt="${product.name}">
        <h2>${product.name}</h2>
        <p>${product.description}</p>
        <p class="price">${product.price}</p>
        <button>Buy Now</button>
      `;

      storeContainer.appendChild(card);
    });
  </script>

</body>
</html>
